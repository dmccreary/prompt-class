<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Context Management Decision Framework</title>
    <script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/vis-network/styles/vis-network.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
    <div class="container">
        <div id="network"></div>

        <div class="title">Context Management Decision Framework</div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-color" style="background-color: #1565C0;"></div>
                <span><strong>Start</strong></span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: #F57C00;"></div>
                <span><strong>Decision</strong></span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: #2E7D32;"></div>
                <span><strong>Technique</strong></span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: #7B1FA2;"></div>
                <span><strong>Combination</strong></span>
            </div>
        </div>

        <div class="right-panel">
            <div class="controls">
                <button class="btn btn-primary" id="reset-btn">Reset View</button>
                <button class="btn btn-secondary" id="expand-btn">Expand All</button>
            </div>

            <div class="status-info" id="status-info">
                <div class="status-title" id="info-title">Context Management</div>
                <div class="status-text" id="status-text">
                    Click any node to learn about that context management technique or decision point. Follow the arrows from the top to find the right strategy for your task.
                </div>
            </div>
        </div>
    </div>

    </main>
    <script src="context-management-decision-framework.js"></script>
</body>
</html>
